services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "15432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: atlas-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - atlas_qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  atlas_postgres_data:
  atlas_qdrant_data:
