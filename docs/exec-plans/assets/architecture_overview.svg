<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Atlas V0 architecture overview">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .note { font: 500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .h { font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .t { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .s { font: 500 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .box { fill: #fff; stroke: #94a3b8; stroke-width: 2; rx: 16; }
      .api { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 14; }
      .svc { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .res { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 14; }
      .ext { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 14; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #cbd5e1; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text class="title" x="60" y="62">Atlas V0 当前总览</text>
  <text class="note" x="60" y="100">读法：请求先进入 FastAPI，然后按 API 分流到不同模块；模块再使用 Postgres、Qdrant、BGE 或 OpenAI。</text>

  <rect class="box" x="120" y="140" width="250" height="80"/>
  <text class="t" x="245" y="172" text-anchor="middle">1. 调用方</text>
  <text class="s" x="245" y="198" text-anchor="middle">curl / HTTP client</text>

  <rect class="box" x="475" y="140" width="250" height="80"/>
  <text class="t" x="600" y="172" text-anchor="middle">2. API 入口</text>
  <text class="s" x="600" y="198" text-anchor="middle">FastAPI Gateway</text>

  <rect class="box" x="830" y="140" width="250" height="80"/>
  <text class="t" x="955" y="172" text-anchor="middle">3. 依赖注入</text>
  <text class="s" x="955" y="198" text-anchor="middle">DB / Qdrant / Services</text>

  <path class="line" d="M370 180 L472 180"/>
  <path class="line" d="M725 180 L827 180"/>

  <text class="h" x="80" y="300">API 分流表</text>

  <rect class="api" x="70" y="330" width="300" height="70"/>
  <text class="t" x="220" y="358" text-anchor="middle">Documents API</text>
  <text class="s" x="220" y="382" text-anchor="middle">POST /v1/documents/ingest</text>
  <rect class="svc" x="435" y="330" width="300" height="70"/>
  <text class="t" x="585" y="358" text-anchor="middle">IngestionService</text>
  <text class="s" x="585" y="382" text-anchor="middle">读文件、切 chunk、生成向量</text>
  <rect class="res" x="800" y="330" width="330" height="70"/>
  <text class="t" x="965" y="358" text-anchor="middle">Postgres + Qdrant + BGE</text>
  <text class="s" x="965" y="382" text-anchor="middle">保存文本 metadata 和向量</text>

  <rect class="api" x="70" y="420" width="300" height="70"/>
  <text class="t" x="220" y="448" text-anchor="middle">Query API</text>
  <text class="s" x="220" y="472" text-anchor="middle">POST /v1/query</text>
  <rect class="svc" x="435" y="420" width="300" height="70"/>
  <text class="t" x="585" y="448" text-anchor="middle">QueryRuntime</text>
  <text class="s" x="585" y="472" text-anchor="middle">检索 evidence、生成答案、落 trace</text>
  <rect class="ext" x="800" y="420" width="330" height="70"/>
  <text class="t" x="965" y="448" text-anchor="middle">Qdrant + Postgres + OpenAI</text>
  <text class="s" x="965" y="472" text-anchor="middle">召回 chunks，交给 gpt-5-nano</text>

  <rect class="api" x="70" y="510" width="300" height="70"/>
  <text class="t" x="220" y="538" text-anchor="middle">Trace API</text>
  <text class="s" x="220" y="562" text-anchor="middle">GET /v1/query/:id/trace</text>
  <rect class="svc" x="435" y="510" width="300" height="70"/>
  <text class="t" x="585" y="538" text-anchor="middle">Trace Reader</text>
  <text class="s" x="585" y="562" text-anchor="middle">组装一次 query 的过程</text>
  <rect class="res" x="800" y="510" width="330" height="70"/>
  <text class="t" x="965" y="538" text-anchor="middle">Postgres</text>
  <text class="s" x="965" y="562" text-anchor="middle">query_runs / retrieval / generation</text>

  <rect class="api" x="70" y="600" width="300" height="70"/>
  <text class="t" x="220" y="628" text-anchor="middle">Eval API</text>
  <text class="s" x="220" y="652" text-anchor="middle">POST /v1/eval/run</text>
  <rect class="svc" x="435" y="600" width="300" height="70"/>
  <text class="t" x="585" y="628" text-anchor="middle">EvalService</text>
  <text class="s" x="585" y="652" text-anchor="middle">逐条调用 QueryRuntime</text>
  <rect class="res" x="800" y="600" width="330" height="70"/>
  <text class="t" x="965" y="628" text-anchor="middle">Postgres</text>
  <text class="s" x="965" y="652" text-anchor="middle">eval_runs / eval_results</text>

  <rect class="api" x="70" y="690" width="300" height="70"/>
  <text class="t" x="220" y="718" text-anchor="middle">Observability API</text>
  <text class="s" x="220" y="742" text-anchor="middle">GET /v1/observability/summary</text>
  <rect class="svc" x="435" y="690" width="300" height="70"/>
  <text class="t" x="585" y="718" text-anchor="middle">Summary Service</text>
  <text class="s" x="585" y="742" text-anchor="middle">统计文档、查询、token、延迟</text>
  <rect class="res" x="800" y="690" width="330" height="70"/>
  <text class="t" x="965" y="718" text-anchor="middle">Postgres</text>
  <text class="s" x="965" y="742" text-anchor="middle">聚合已有运行记录</text>

  <rect class="api" x="70" y="780" width="300" height="70"/>
  <text class="t" x="220" y="808" text-anchor="middle">Admin / Health</text>
  <text class="s" x="220" y="832" text-anchor="middle">reset-dev-data / health</text>
  <rect class="svc" x="435" y="780" width="300" height="70"/>
  <text class="t" x="585" y="808" text-anchor="middle">Dev Reset / Health Check</text>
  <text class="s" x="585" y="832" text-anchor="middle">清理开发数据或检查依赖</text>
  <rect class="res" x="800" y="780" width="330" height="70"/>
  <text class="t" x="965" y="808" text-anchor="middle">Postgres + Qdrant</text>
  <text class="s" x="965" y="832" text-anchor="middle">清理、重建或检查状态</text>

  <path class="line" d="M370 365 L432 365"/>
  <path class="line" d="M735 365 L797 365"/>
  <path class="line" d="M370 455 L432 455"/>
  <path class="line" d="M735 455 L797 455"/>
  <path class="line" d="M370 545 L432 545"/>
  <path class="line" d="M735 545 L797 545"/>
  <path class="line" d="M370 635 L432 635"/>
  <path class="line" d="M735 635 L797 635"/>
  <path class="line" d="M370 725 L432 725"/>
  <path class="line" d="M735 725 L797 725"/>
  <path class="line" d="M370 815 L432 815"/>
  <path class="line" d="M735 815 L797 815"/>
</svg>
