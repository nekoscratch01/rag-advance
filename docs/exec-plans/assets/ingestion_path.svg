<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Atlas V0 ingestion path">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .api { fill: #eef2ff; stroke: #818cf8; }
      .store { fill: #ecfdf5; stroke: #34d399; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="520"/>
  <text class="title" x="50" y="58">文档入库链路</text>

  <rect class="api" x="50" y="110" width="230" height="78" rx="14"/>
  <text class="label" x="165" y="142" text-anchor="middle">POST /documents</text>
  <text class="small" x="165" y="168" text-anchor="middle">ingest paths</text>

  <rect class="box" x="335" y="110" width="210" height="78"/>
  <text class="label" x="440" y="142" text-anchor="middle">PathPolicy</text>
  <text class="small" x="440" y="168" text-anchor="middle">samples / corpus only</text>

  <rect class="box" x="600" y="110" width="210" height="78"/>
  <text class="label" x="705" y="142" text-anchor="middle">Loader</text>
  <text class="small" x="705" y="168" text-anchor="middle">PDF / MD / TXT</text>

  <rect class="box" x="865" y="110" width="190" height="78"/>
  <text class="label" x="960" y="142" text-anchor="middle">Chunker</text>
  <text class="small" x="960" y="168" text-anchor="middle">page / section</text>

  <path class="line" d="M280 149 L333 149"/>
  <path class="line" d="M545 149 L598 149"/>
  <path class="line" d="M810 149 L863 149"/>

  <rect class="box" x="335" y="285" width="250" height="86"/>
  <text class="label" x="460" y="320" text-anchor="middle">Local BGE</text>
  <text class="small" x="460" y="348" text-anchor="middle">chunk embedding</text>

  <rect class="store" x="650" y="255" width="320" height="78"/>
  <text class="label" x="810" y="287" text-anchor="middle">Postgres</text>
  <text class="small" x="810" y="313" text-anchor="middle">documents / chunks / ingestion_runs</text>

  <rect class="store" x="650" y="365" width="320" height="78"/>
  <text class="label" x="810" y="397" text-anchor="middle">Qdrant</text>
  <text class="small" x="810" y="423" text-anchor="middle">chunk vectors</text>

  <path class="line" d="M960 188 C960 230 460 230 460 283"/>
  <path class="line" d="M585 315 L648 295"/>
  <path class="line" d="M585 342 L648 397"/>
</svg>
