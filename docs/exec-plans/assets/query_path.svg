<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-label="Atlas V0 query path">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .api { fill: #eef2ff; stroke: #818cf8; }
      .store { fill: #ecfdf5; stroke: #34d399; }
      .llm { fill: #fff7ed; stroke: #fb923c; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="650"/>
  <text class="title" x="50" y="58">查询回答链路</text>

  <rect class="api" x="50" y="110" width="210" height="78" rx="14"/>
  <text class="label" x="155" y="142" text-anchor="middle">POST /query</text>
  <text class="small" x="155" y="168" text-anchor="middle">user question</text>

  <rect class="box" x="320" y="110" width="230" height="78"/>
  <text class="label" x="435" y="142" text-anchor="middle">QueryRuntime</text>
  <text class="small" x="435" y="168" text-anchor="middle">orchestrates query</text>

  <rect class="box" x="610" y="110" width="230" height="78"/>
  <text class="label" x="725" y="142" text-anchor="middle">DenseRetriever</text>
  <text class="small" x="725" y="168" text-anchor="middle">retrieve evidence</text>

  <path class="line" d="M260 149 L318 149"/>
  <path class="line" d="M550 149 L608 149"/>

  <rect class="box" x="165" y="280" width="220" height="78"/>
  <text class="label" x="275" y="312" text-anchor="middle">Local BGE</text>
  <text class="small" x="275" y="338" text-anchor="middle">query embedding</text>

  <rect class="store" x="440" y="245" width="230" height="78"/>
  <text class="label" x="555" y="277" text-anchor="middle">Qdrant</text>
  <text class="small" x="555" y="303" text-anchor="middle">vector search</text>

  <rect class="store" x="440" y="365" width="230" height="78"/>
  <text class="label" x="555" y="397" text-anchor="middle">Postgres</text>
  <text class="small" x="555" y="423" text-anchor="middle">chunk metadata</text>

  <rect class="box" x="735" y="280" width="250" height="78"/>
  <text class="label" x="860" y="312" text-anchor="middle">Context Budget</text>
  <text class="small" x="860" y="338" text-anchor="middle">max evidence tokens</text>

  <path class="line" d="M725 188 C725 235 275 235 275 278"/>
  <path class="line" d="M385 319 L438 288"/>
  <path class="line" d="M725 188 C725 275 555 275 555 323"/>
  <path class="line" d="M725 188 C725 355 555 355 555 363"/>
  <path class="line" d="M670 285 L733 315"/>

  <rect class="llm" x="125" y="520" width="230" height="78"/>
  <text class="label" x="240" y="552" text-anchor="middle">OpenAI</text>
  <text class="small" x="240" y="578" text-anchor="middle">gpt-5-nano</text>

  <rect class="box" x="435" y="520" width="230" height="78"/>
  <text class="label" x="550" y="552" text-anchor="middle">CitationBuilder</text>
  <text class="small" x="550" y="578" text-anchor="middle">real markers only</text>

  <rect class="box" x="745" y="520" width="230" height="78"/>
  <text class="label" x="860" y="552" text-anchor="middle">TraceLogger</text>
  <text class="small" x="860" y="578" text-anchor="middle">query trace</text>

  <path class="line" d="M860 358 C860 470 240 470 240 518"/>
  <path class="line" d="M355 559 L433 559"/>
  <path class="line" d="M665 559 L743 559"/>
  <path class="line" d="M860 520 C860 470 555 470 555 445"/>
</svg>
