<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1050" viewBox="0 0 1500 1050" role="img" aria-label="Atlas V1 Hybrid Kernel architecture overview">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .note { font: 500 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .h { font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .t { font: 750 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .s { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .data { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 10; }
      .svc { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .store { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 10; }
      .risk { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; }
      .eval { fill: #fdf2f8; stroke: #f472b6; stroke-width: 2; rx: 10; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1500" height="1050"/>
  <text class="title" x="60" y="62">Atlas V1 Hybrid Kernel 总览</text>
  <text class="note" x="60" y="98">读法：V1 先冻结 FinanceBench benchmark，再把查询链路从 dense-only 升级为 dense + lexical + RRF + evidence + critic。</text>

  <rect class="lane" x="45" y="130" width="1410" height="200"/>
  <text class="h" x="70" y="165">A. Benchmark 与知识库准备</text>
  <rect class="data" x="80" y="195" width="190" height="85"/>
  <text class="t" x="175" y="226" text-anchor="middle">FinanceBench</text>
  <text class="s" x="175" y="250" text-anchor="middle">150 QA / PDFs</text>
  <rect class="svc" x="330" y="195" width="210" height="85"/>
  <text class="t" x="435" y="226" text-anchor="middle">Dataset Adapter</text>
  <text class="s" x="435" y="250" text-anchor="middle">download / parse / chunk</text>
  <rect class="data" x="600" y="195" width="230" height="85"/>
  <text class="t" x="715" y="226" text-anchor="middle">Frozen Artifacts</text>
  <text class="s" x="715" y="250" text-anchor="middle">manifest / pages / chunks</text>
  <rect class="store" x="890" y="195" width="220" height="85"/>
  <text class="t" x="1000" y="226" text-anchor="middle">Postgres</text>
  <text class="s" x="1000" y="250" text-anchor="middle">documents / chunks</text>
  <rect class="store" x="1170" y="195" width="220" height="85"/>
  <text class="t" x="1280" y="226" text-anchor="middle">Qdrant V1</text>
  <text class="s" x="1280" y="250" text-anchor="middle">dense + BM25 sparse</text>
  <path class="line" d="M270 238 L327 238"/>
  <path class="line" d="M540 238 L597 238"/>
  <path class="line" d="M830 238 L887 238"/>
  <path class="line" d="M1110 238 L1167 238"/>

  <rect class="lane" x="45" y="365" width="1410" height="390"/>
  <text class="h" x="70" y="400">B. V1 Query Runtime</text>
  <rect class="svc" x="80" y="435" width="170" height="80"/>
  <text class="t" x="165" y="465" text-anchor="middle">Query API</text>
  <text class="s" x="165" y="489" text-anchor="middle">/v1/query</text>
  <rect class="svc" x="300" y="435" width="180" height="80"/>
  <text class="t" x="390" y="465" text-anchor="middle">Normalizer</text>
  <text class="s" x="390" y="489" text-anchor="middle">same query contract</text>

  <rect class="data" x="560" y="400" width="210" height="90"/>
  <text class="t" x="665" y="432" text-anchor="middle">Dense Retriever</text>
  <text class="s" x="665" y="456" text-anchor="middle">BGE-small + Qdrant</text>
  <rect class="data" x="560" y="525" width="210" height="90"/>
  <text class="t" x="665" y="557" text-anchor="middle">Lexical Retriever</text>
  <text class="s" x="665" y="581" text-anchor="middle">FastEmbed BM25 sparse</text>

  <rect class="svc" x="840" y="462" width="170" height="90"/>
  <text class="t" x="925" y="494" text-anchor="middle">Candidate</text>
  <text class="s" x="925" y="518" text-anchor="middle">raw ranks / scores</text>
  <rect class="svc" x="1080" y="462" width="170" height="90"/>
  <text class="t" x="1165" y="494" text-anchor="middle">RRF Fusion</text>
  <text class="s" x="1165" y="518" text-anchor="middle">client-side k=60</text>

  <rect class="risk" x="80" y="650" width="190" height="80"/>
  <text class="t" x="175" y="680" text-anchor="middle">Evidence Builder</text>
  <text class="s" x="175" y="704" text-anchor="middle">merge / budget / metadata</text>
  <rect class="risk" x="330" y="650" width="180" height="80"/>
  <text class="t" x="420" y="680" text-anchor="middle">Critic Lite</text>
  <text class="s" x="420" y="704" text-anchor="middle">coverage / citation rules</text>
  <rect class="risk" x="570" y="650" width="180" height="80"/>
  <text class="t" x="660" y="680" text-anchor="middle">Answer Generator</text>
  <text class="s" x="660" y="704" text-anchor="middle">same prompt / LLM</text>
  <rect class="risk" x="810" y="650" width="180" height="80"/>
  <text class="t" x="900" y="680" text-anchor="middle">Citation Builder</text>
  <text class="s" x="900" y="704" text-anchor="middle">marker-driven only</text>
  <rect class="svc" x="1050" y="650" width="180" height="80"/>
  <text class="t" x="1140" y="680" text-anchor="middle">Trace Logger</text>
  <text class="s" x="1140" y="704" text-anchor="middle">ranks / evidence / critic</text>
  <rect class="svc" x="1290" y="650" width="130" height="80"/>
  <text class="t" x="1355" y="680" text-anchor="middle">Response</text>
  <text class="s" x="1355" y="704" text-anchor="middle">answer + trace_id</text>

  <path class="line" d="M250 475 L297 475"/>
  <path class="line" d="M480 475 L557 445"/>
  <path class="line" d="M480 475 L557 570"/>
  <path class="line" d="M770 445 L837 495"/>
  <path class="line" d="M770 570 L837 520"/>
  <path class="line" d="M1010 507 L1077 507"/>
  <path class="line" d="M1165 552 L1165 620 L270 690"/>
  <path class="line" d="M270 690 L327 690"/>
  <path class="line" d="M510 690 L567 690"/>
  <path class="line" d="M750 690 L807 690"/>
  <path class="line" d="M990 690 L1047 690"/>
  <path class="line" d="M1230 690 L1287 690"/>

  <rect class="lane" x="45" y="790" width="1410" height="180"/>
  <text class="h" x="70" y="825">C. Eval / Cache / Migration Guardrails</text>
  <rect class="eval" x="80" y="855" width="260" height="80"/>
  <text class="t" x="210" y="885" text-anchor="middle">FinanceBench Eval</text>
  <text class="s" x="210" y="909" text-anchor="middle">dense vs lexical vs hybrid</text>
  <rect class="eval" x="395" y="855" width="260" height="80"/>
  <text class="t" x="525" y="885" text-anchor="middle">Metrics</text>
  <text class="s" x="525" y="909" text-anchor="middle">doc/page hit, MRR, citation</text>
  <rect class="svc" x="710" y="855" width="260" height="80"/>
  <text class="t" x="840" y="885" text-anchor="middle">Exact Cache</text>
  <text class="s" x="840" y="909" text-anchor="middle">optional, benchmark bypass</text>
  <rect class="svc" x="1025" y="855" width="330" height="80"/>
  <text class="t" x="1190" y="885" text-anchor="middle">OpenSearch Boundary</text>
  <text class="s" x="1190" y="909" text-anchor="middle">LexicalRetriever interface only</text>
  <path class="line" d="M340 895 L392 895"/>
  <path class="dash" d="M970 895 L1022 895"/>
</svg>
