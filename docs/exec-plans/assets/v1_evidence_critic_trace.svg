<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="620" viewBox="0 0 1350 620" role="img" aria-label="Atlas V1 evidence critic trace pipeline">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .note { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .svc { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .risk { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; }
      .eval { fill: #fdf2f8; stroke: #f472b6; stroke-width: 2; rx: 10; }
      .store { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 10; }
      .t { font: 750 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .s { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1350" height="620"/>
  <text class="title" x="50" y="58">V1 Part 3: Evidence / Critic / Trace 可靠性链路</text>
  <text class="note" x="50" y="92">目标：把 fused candidates 整理成可引用证据包，并用规则 critic 检查证据覆盖和 citation。</text>

  <rect class="svc" x="65" y="210" width="175" height="90"/>
  <text class="t" x="152" y="243" text-anchor="middle">Fused Candidates</text>
  <text class="s" x="152" y="270" text-anchor="middle">rank / provenance</text>

  <rect class="risk" x="300" y="210" width="190" height="90"/>
  <text class="t" x="395" y="243" text-anchor="middle">Evidence Builder</text>
  <text class="s" x="395" y="270" text-anchor="middle">dedupe / merge / budget</text>

  <rect class="risk" x="550" y="210" width="180" height="90"/>
  <text class="t" x="640" y="243" text-anchor="middle">Evidence Pack</text>
  <text class="s" x="640" y="270" text-anchor="middle">blocks with c1..cN</text>

  <rect class="risk" x="790" y="135" width="180" height="90"/>
  <text class="t" x="880" y="168" text-anchor="middle">Pre Critic</text>
  <text class="s" x="880" y="195" text-anchor="middle">coverage / anchors</text>

  <rect class="risk" x="790" y="300" width="180" height="90"/>
  <text class="t" x="880" y="333" text-anchor="middle">Answer Generator</text>
  <text class="s" x="880" y="360" text-anchor="middle">same prompt / LLM</text>

  <rect class="risk" x="1030" y="300" width="180" height="90"/>
  <text class="t" x="1120" y="333" text-anchor="middle">Citation Builder</text>
  <text class="s" x="1120" y="360" text-anchor="middle">marker-driven</text>

  <rect class="risk" x="1030" y="135" width="180" height="90"/>
  <text class="t" x="1120" y="168" text-anchor="middle">Post Critic</text>
  <text class="s" x="1120" y="195" text-anchor="middle">citation / anchors</text>

  <rect class="store" x="550" y="450" width="180" height="90"/>
  <text class="t" x="640" y="483" text-anchor="middle">Trace Tables</text>
  <text class="s" x="640" y="510" text-anchor="middle">retrieval / critic / gen</text>

  <rect class="eval" x="790" y="450" width="200" height="90"/>
  <text class="t" x="890" y="483" text-anchor="middle">Eval Metrics</text>
  <text class="s" x="890" y="510" text-anchor="middle">citation / unsupported</text>

  <path class="line" d="M240 255 L297 255"/>
  <path class="line" d="M490 255 L547 255"/>
  <path class="line" d="M730 235 L787 180"/>
  <path class="line" d="M880 225 L880 297"/>
  <path class="line" d="M970 345 L1027 345"/>
  <path class="line" d="M1120 300 L1120 228"/>
  <path class="dash" d="M640 300 L640 447"/>
  <path class="dash" d="M880 390 L702 447"/>
  <path class="dash" d="M1120 225 L990 450"/>
  <path class="line" d="M730 495 L787 495"/>

  <text class="tiny" x="880" y="420" text-anchor="middle">no LLM judge, no fixed retrieval-score threshold</text>
</svg>
