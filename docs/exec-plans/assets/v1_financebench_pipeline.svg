<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-label="FinanceBench benchmark preparation and runtime storage pipeline">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .note { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #fff; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .data { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 10; }
      .artifact { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 10; }
      .eval { fill: #fdf2f8; stroke: #f472b6; stroke-width: 2; rx: 10; }
      .t { font: 750 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .s { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1400" height="620"/>
  <text class="title" x="50" y="58">V1 Part 1: FinanceBench Frozen Artifacts -> Runtime Storage</text>
  <text class="note" x="50" y="92">JSONL 只是可复现实验的冻结中间产物；线上查询读取 Postgres + Qdrant。</text>

  <rect class="data" x="55" y="150" width="205" height="90"/>
  <text class="t" x="157" y="184" text-anchor="middle">HF Dataset</text>
  <text class="s" x="157" y="211" text-anchor="middle">150 QA rows</text>

  <rect class="data" x="55" y="310" width="205" height="90"/>
  <text class="t" x="157" y="344" text-anchor="middle">PDF Sources</text>
  <text class="s" x="157" y="371" text-anchor="middle">doc_link / GitHub mirror</text>

  <rect class="box" x="330" y="230" width="220" height="100"/>
  <text class="t" x="440" y="264" text-anchor="middle">FinanceBench Adapter</text>
  <text class="s" x="440" y="291" text-anchor="middle">dedupe by doc/link/hash</text>

  <rect class="artifact" x="610" y="90" width="250" height="85"/>
  <text class="t" x="735" y="122" text-anchor="middle">Frozen manifest.jsonl</text>
  <text class="s" x="735" y="148" text-anchor="middle">doc metadata / sha256</text>

  <rect class="artifact" x="610" y="210" width="250" height="85"/>
  <text class="t" x="735" y="242" text-anchor="middle">Frozen pages.jsonl</text>
  <text class="s" x="735" y="268" text-anchor="middle">parse audit / page labels</text>

  <rect class="artifact" x="610" y="330" width="250" height="105"/>
  <text class="t" x="735" y="362" text-anchor="middle">Frozen parent/child JSONL</text>
  <text class="s" x="735" y="388" text-anchor="middle">parent_blocks.jsonl</text>
  <text class="s" x="735" y="412" text-anchor="middle">child_chunks.jsonl</text>

  <rect class="box" x="930" y="150" width="220" height="100"/>
  <text class="t" x="1040" y="184" text-anchor="middle">ingest_financebench</text>
  <text class="s" x="1040" y="211" text-anchor="middle">JSONL -> DB rows</text>
  <text class="s" x="1040" y="233" text-anchor="middle">child vectors -> Qdrant</text>

  <rect class="data" x="1210" y="110" width="150" height="145"/>
  <text class="t" x="1285" y="143" text-anchor="middle">Postgres</text>
  <text class="s" x="1285" y="170" text-anchor="middle">documents</text>
  <text class="s" x="1285" y="194" text-anchor="middle">parent_blocks</text>
  <text class="s" x="1285" y="218" text-anchor="middle">chunks</text>
  <text class="s" x="1285" y="242" text-anchor="middle">query_cache</text>

  <rect class="data" x="1210" y="310" width="150" height="105"/>
  <text class="t" x="1285" y="343" text-anchor="middle">Qdrant</text>
  <text class="s" x="1285" y="370" text-anchor="middle">child dense</text>
  <text class="s" x="1285" y="394" text-anchor="middle">BM25 sparse</text>

  <rect class="eval" x="930" y="340" width="220" height="85"/>
  <text class="t" x="1040" y="372" text-anchor="middle">financebench_cases.yaml</text>
  <text class="s" x="1040" y="398" text-anchor="middle">gold eval cases</text>

  <rect class="artifact" x="610" y="475" width="250" height="75"/>
  <text class="t" x="735" y="506" text-anchor="middle">corpus_version.json</text>
  <text class="s" x="735" y="532" text-anchor="middle">parser / chunker / hashes</text>

  <path class="line" d="M260 195 L327 260"/>
  <path class="line" d="M260 355 L327 300"/>
  <path class="line" d="M550 270 L607 135"/>
  <path class="line" d="M550 280 L607 253"/>
  <path class="line" d="M550 295 L607 383"/>
  <path class="line" d="M860 252 L927 196"/>
  <path class="line" d="M860 382 L927 196"/>
  <path class="line" d="M1150 190 L1207 180"/>
  <path class="line" d="M1150 220 L1207 360"/>
  <path class="line" d="M860 382 L927 382"/>
</svg>
