<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="650" viewBox="0 0 1350 650" role="img" aria-label="Atlas V1 hybrid retrieval pipeline">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .note { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .query { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 10; }
      .dense { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 10; }
      .lex { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 10; }
      .svc { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .out { fill: #fdf2f8; stroke: #f472b6; stroke-width: 2; rx: 10; }
      .t { font: 750 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .s { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1350" height="650"/>
  <text class="title" x="50" y="58">V1 Part 2: Hybrid Retrieval 核心链路</text>
  <text class="note" x="50" y="92">目标：dense 和 lexical 各自召回，再用 client-side RRF 融合，保留所有原始 rank / score。</text>

  <rect class="query" x="70" y="265" width="180" height="90"/>
  <text class="t" x="160" y="298" text-anchor="middle">Query</text>
  <text class="s" x="160" y="325" text-anchor="middle">normalized text</text>

  <rect class="dense" x="330" y="140" width="240" height="100"/>
  <text class="t" x="450" y="174" text-anchor="middle">Dense Retriever</text>
  <text class="s" x="450" y="201" text-anchor="middle">BGE-small query embedding</text>
  <text class="tiny" x="450" y="224" text-anchor="middle">Qdrant dense vector</text>

  <rect class="lex" x="330" y="380" width="240" height="100"/>
  <text class="t" x="450" y="414" text-anchor="middle">Lexical Retriever</text>
  <text class="s" x="450" y="441" text-anchor="middle">FastEmbed BM25 sparse</text>
  <text class="tiny" x="450" y="464" text-anchor="middle">Qdrant sparse vector</text>

  <rect class="svc" x="660" y="140" width="220" height="100"/>
  <text class="t" x="770" y="174" text-anchor="middle">Dense Candidates</text>
  <text class="s" x="770" y="201" text-anchor="middle">dense_rank / dense_score</text>

  <rect class="svc" x="660" y="380" width="220" height="100"/>
  <text class="t" x="770" y="414" text-anchor="middle">Lexical Candidates</text>
  <text class="s" x="770" y="441" text-anchor="middle">lexical_rank / score</text>

  <rect class="svc" x="965" y="265" width="190" height="90"/>
  <text class="t" x="1060" y="298" text-anchor="middle">RRF Fusion</text>
  <text class="s" x="1060" y="325" text-anchor="middle">k=60, dedupe chunk_id</text>

  <rect class="out" x="1210" y="265" width="110" height="90"/>
  <text class="t" x="1265" y="298" text-anchor="middle">Fused</text>
  <text class="s" x="1265" y="325" text-anchor="middle">top 30</text>

  <path class="line" d="M250 310 L327 190"/>
  <path class="line" d="M250 310 L327 430"/>
  <path class="line" d="M570 190 L657 190"/>
  <path class="line" d="M570 430 L657 430"/>
  <path class="line" d="M880 190 L962 300"/>
  <path class="line" d="M880 430 L962 325"/>
  <path class="line" d="M1155 310 L1207 310"/>

  <text class="tiny" x="1060" y="388" text-anchor="middle">fusion_score = 1/(k+dense_rank) + 1/(k+lexical_rank)</text>
</svg>
